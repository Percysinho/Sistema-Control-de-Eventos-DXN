<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control 180 · Entradas DXN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B1F27;
    --panel:#242A35;
    --panel-light:#2E3644;
    --panel-hover:#323B4A;
    --amber:#E8A33D;
    --amber-dim:#B98230;
    --teal:#4FBDBA;
    --cream:#F3EFE6;
    --muted:#8A93A3;
    --danger:#E2645A;
    --danger-dim:#7A3530;
    --border:#38404E;
    --ok:#6FBF73;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--cream);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Oswald',sans-serif; letter-spacing:0.02em; text-transform:uppercase;}
  #app{max-width:1080px;margin:0 auto;padding:20px 16px 60px;}

  /* HEADER */
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{width:44px;height:44px;border-radius:9px;background:linear-gradient(155deg,var(--amber),var(--amber-dim));display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;font-size:20px;color:#20242c;flex-shrink:0;}
  .brand h1{font-family:'Oswald';font-size:20px;margin:0;letter-spacing:0.03em;text-transform:uppercase;}
  .brand p{margin:0;color:var(--muted);font-size:12.5px;}
  .profile-chip{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);padding:7px 12px 7px 7px;border-radius:99px;cursor:pointer;}
  .profile-chip .av{width:28px;height:28px;border-radius:50%;background:var(--teal);color:#122;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;font-family:'Oswald';}
  .profile-chip span{font-size:13px;}
  .profile-chip small{display:block;color:var(--muted);font-size:11px;}

  /* NAV */
  nav{display:flex;gap:6px;background:var(--panel);padding:5px;border-radius:12px;border:1px solid var(--border);margin-bottom:22px;overflow-x:auto;}
  nav button{flex:1;white-space:nowrap;background:transparent;border:none;color:var(--muted);padding:9px 14px;border-radius:9px;font-family:'Inter';font-weight:600;font-size:13px;cursor:pointer;transition:.15s;}
  nav button.active{background:var(--amber);color:#20242c;}
  nav button:not(.active):hover{background:var(--panel-hover);color:var(--cream);}

  /* CARDS / LAYOUT */
  .grid{display:grid;gap:14px;}
  .grid.cols-4{grid-template-columns:repeat(4,1fr);}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .grid.cols-2{grid-template-columns:repeat(2,1fr);}
  @media(max-width:760px){.grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr 1fr;}}
  @media(max-width:480px){.grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr;}}

  .stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .stat .num{font-family:'Oswald';font-size:26px;color:var(--amber);}
  .stat .lbl{color:var(--muted);font-size:12px;margin-top:2px;}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
  .panel h2{font-family:'Oswald';font-size:15px;text-transform:uppercase;letter-spacing:.04em;margin:0 0 14px;color:var(--cream);}
  .panel h2 span{color:var(--muted);text-transform:none;letter-spacing:0;font-family:'Inter';font-size:12px;font-weight:400;margin-left:8px;}

  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;margin-top:12px;}
  label:first-child{margin-top:0;}
  input,select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--cream);padding:9px 11px;border-radius:8px;font-size:14px;font-family:'Inter';}
  input:focus,select:focus{outline:none;border-color:var(--amber);}
  .row{display:flex;gap:10px;}
  .row>*{flex:1;}
  .chk{display:flex;align-items:center;gap:8px;margin-top:14px;}
  .chk input{width:auto;}
  .chk label{margin:0;color:var(--cream);font-size:13px;}

  button.btn{cursor:pointer;border:none;border-radius:8px;padding:10px 16px;font-family:'Inter';font-weight:600;font-size:13.5px;transition:.15s;}
  .btn-primary{background:var(--amber);color:#20242c;}
  .btn-primary:hover{background:#f2b357;}
  .btn-ghost{background:var(--panel-light);color:var(--cream);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--panel-hover);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger-dim);}
  .btn-danger:hover{background:var(--danger-dim);color:var(--cream);}
  .btn-sm{padding:6px 10px;font-size:12px;}
  .btn-block{width:100%;margin-top:16px;}

  /* TICKET */
  .ticket{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
  .ticket .stub{width:78px;flex-shrink:0;background:var(--panel-light);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border-right:2px dashed var(--border);}
  .ticket .stub:before,.ticket .stub:after{content:'';position:absolute;width:16px;height:16px;background:var(--bg);border-radius:50%;right:-9px;}
  .ticket .stub:before{top:-8px;} .ticket .stub:after{bottom:-8px;}
  .ticket .stub .tipo-ico{font-family:'Oswald';font-size:11px;color:var(--amber);text-transform:uppercase;text-align:center;letter-spacing:.03em;}
  .ticket .body{flex:1;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
  .ticket .info h3{margin:0 0 4px;font-family:'Oswald';font-size:15px;text-transform:uppercase;}
  .ticket .info p{margin:0;color:var(--muted);font-size:12.5px;}
  .ticket .price{text-align:right;}
  .ticket .price .p{font-family:'IBM Plex Mono';font-weight:600;color:var(--teal);font-size:15px;}
  .ticket .price .pv{font-size:11px;color:var(--muted);}
  .ticket .actions{display:flex;gap:6px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;padding:8px 10px;border-bottom:1px solid var(--border);}
  td{padding:9px 10px;border-bottom:1px solid var(--border);}
  tr:last-child td{border-bottom:none;}
  tfoot td{font-weight:700;color:var(--cream);border-top:2px solid var(--border);border-bottom:none;}
  .badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;}
  .badge-gratis{background:rgba(111,191,115,.15);color:var(--ok);}
  .badge-sede{background:rgba(79,189,186,.15);color:var(--teal);}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:13.5px;}
  .preview{background:var(--bg);border:1px dashed var(--border);border-radius:10px;padding:12px 14px;margin-top:14px;font-size:13px;}
  .preview b{color:var(--amber);}
  .search{margin-bottom:12px;}

  .overlay{position:fixed;inset:0;background:rgba(10,12,16,.75);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:360px;}
  .modal h2{font-family:'Oswald';text-transform:uppercase;font-size:17px;margin:0 0 4px;}
  .modal p{color:var(--muted);font-size:13px;margin:0 0 6px;}

  ::-webkit-scrollbar{height:6px;width:6px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
const TIPOS = [
  {id:'semanal', label:'Semanal'},
  {id:'mensual', label:'Mensual'},
  {id:'bimestral', label:'Bimestral'},
  {id:'ruge', label:'RUGE (Trimestral)'},
  {id:'convencion', label:'Convención (Cuatrimestral)'},
];
const tipoLabel = id => (TIPOS.find(t=>t.id===id)||{}).label || id;

let sedes = ['San Felipe','Hyper','Pachacutec'];
let socios = [];      // {id, nombre, sede}
let eventos = [];     // {id, tipo, fecha, sede, precioNormal, tienePreventa, precioPreventa, fechaLimitePreventa}
let asistencias = []; // {id, eventoId, esSocio, socioId, nombre, sede, entradas, tipoCompra, gratis, pagadas, monto, registradoPor, ts}
let perfil = null;    // {nombre, sede}
let tab = 'resumen';
let registrarEventoId = null;
let socioSearch = '';
let reporteAgrupa = 'sede';
let loaded = false;

const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmtSoles = n => 'S/ ' + (Math.round(n*100)/100).toFixed(2);
const fmtFecha = f => { if(!f) return '—'; const [y,m,d]=f.split('-'); return `${d}/${m}/${y}`; };
const hoy = () => new Date().toISOString().slice(0,10);

async function storageGet(key, shared){
  try{ const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function storageSet(key, value, shared){
  try{ await window.storage.set(key, JSON.stringify(value), shared); }catch(e){ console.error('storage set fail', key, e); }
}

async function loadAll(){
  const [s, so, ev, asi, perf] = await Promise.all([
    storageGet('sedes', true),
    storageGet('socios', true),
    storageGet('eventos', true),
    storageGet('asistencias', true),
    storageGet('perfil', false),
  ]);
  if(s) sedes = s;
  if(so) socios = so;
  if(ev) eventos = ev;
  if(asi) asistencias = asi;
  if(perf) perfil = perf;
  loaded = true;
  render();
}

function calcTicket(pagadas, precio){
  const gratis = Math.floor(pagadas/5);
  const total = pagadas + gratis;
  const monto = pagadas * precio;
  return {gratis, total, monto};
}

function precioAplicable(ev, tipoCompra){
  if(tipoCompra==='preventa' && ev.tienePreventa) return ev.precioPreventa;
  return ev.precioNormal;
}

// ---------- RENDER ----------
function render(){
  const app = document.getElementById('app');
  if(!loaded){ app.innerHTML = `<div class="empty" style="padding-top:80px;">Cargando…</div>`; return; }
  if(!perfil){ app.innerHTML = headerHTML(false) + profileModalHTML(); bindProfileModal(); return; }

  let body = '';
  if(tab==='resumen') body = resumenHTML();
  else if(tab==='eventos') body = eventosHTML();
  else if(tab==='registrar') body = registrarHTML();
  else if(tab==='socios') body = sociosHTML();
  else if(tab==='reportes') body = reportesHTML();

  app.innerHTML = headerHTML(true) + navHTML() + body;
  bindGlobal();
}

function headerHTML(withProfile){
  return `
  <header>
    <div class="brand">
      <div class="mark">180</div>
      <div><h1>Control 180</h1><p>Entradas &amp; asistencia · Sistema Educativo DXN</p></div>
    </div>
    ${withProfile ? `
    <div class="profile-chip" id="btnPerfil">
      <div class="av">${perfil.nombre.slice(0,2).toUpperCase()}</div>
      <div><span>${perfil.nombre}</span><small>${perfil.sede}</small></div>
    </div>` : ''}
  </header>`;
}

function navHTML(){
  const items = [
    ['resumen','Resumen'],['eventos','Eventos'],['registrar','Registrar'],
    ['socios','Socios'],['reportes','Reportes']
  ];
  return `<nav>${items.map(([id,lbl])=>`<button data-tab="${id}" class="${tab===id?'active':''}">${lbl}</button>`).join('')}</nav>`;
}

function profileModalHTML(){
  return `<div class="overlay"><div class="modal">
    <h2>Bienvenido</h2>
    <p>Regístrate para identificar quién registra cada asistencia.</p>
    <label>Tu nombre</label>
    <input id="pfNombre" placeholder="Ej. Percy Rojas">
    <label>Sede que administras</label>
    <select id="pfSede">${sedes.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
    <button class="btn btn-primary btn-block" id="pfGuardar">Empezar</button>
  </div></div>`;
}

function resumenHTML(){
  const totalMonto = asistencias.reduce((a,x)=>a+x.monto,0);
  const totalPersonas = asistencias.reduce((a,x)=>a+x.entradas+x.gratis,0);
  const totalGratis = asistencias.reduce((a,x)=>a+x.gratis,0);
  const proximos = eventos.filter(e=>e.fecha>=hoy()).sort((a,b)=>a.fecha.localeCompare(b.fecha)).slice(0,4);

  const porSede = {};
  sedes.forEach(s=>porSede[s]={personas:0,monto:0});
  asistencias.forEach(a=>{ if(!porSede[a.sede]) porSede[a.sede]={personas:0,monto:0}; porSede[a.sede].personas+=a.entradas+a.gratis; porSede[a.sede].monto+=a.monto; });

  return `
  <div class="grid cols-4">
    <div class="stat"><div class="num mono">${fmtSoles(totalMonto)}</div><div class="lbl">Recaudado total</div></div>
    <div class="stat"><div class="num mono">${totalPersonas}</div><div class="lbl">Asistentes totales</div></div>
    <div class="stat"><div class="num mono">${totalGratis}</div><div class="lbl">Entradas gratis otorgadas</div></div>
    <div class="stat"><div class="num mono">${eventos.length}</div><div class="lbl">Eventos registrados</div></div>
  </div>

  <div class="panel" style="margin-top:16px;">
    <h2>Por sede</h2>
    <table><thead><tr><th>Sede</th><th>Asistentes</th><th>Recaudado</th></tr></thead>
    <tbody>${Object.entries(porSede).map(([s,v])=>`<tr><td>${s}</td><td>${v.personas}</td><td class="mono">${fmtSoles(v.monto)}</td></tr>`).join('') || `<tr><td colspan="3" class="empty">Aún no hay datos</td></tr>`}</tbody></table>
  </div>

  <div class="panel">
    <h2>Próximos eventos</h2>
    ${proximos.length ? proximos.map(e=>ticketCard(e)).join('') : `<div class="empty">No hay eventos futuros creados. Ve a la pestaña <b>Eventos</b> para crear uno.</div>`}
  </div>`;
}

function ticketCard(e, opts={}){
  const asis = asistencias.filter(a=>a.eventoId===e.id);
  const totalPersonas = asis.reduce((s,a)=>s+a.entradas+a.gratis,0);
  return `
  <div class="ticket">
    <div class="stub"><div class="tipo-ico">${tipoLabel(e.tipo).split(' ')[0]}</div></div>
    <div class="body">
      <div class="info">
        <h3>${tipoLabel(e.tipo)} · ${e.sede}</h3>
        <p>${fmtFecha(e.fecha)} &nbsp;·&nbsp; ${totalPersonas} asistentes registrados</p>
      </div>
      <div class="price">
        <div class="p">${fmtSoles(e.precioNormal)}</div>
        ${e.tienePreventa ? `<div class="pv">Preventa: ${fmtSoles(e.precioPreventa)} hasta ${fmtFecha(e.fechaLimitePreventa)}</div>` : ''}
      </div>
      <div class="actions">
        <button class="btn btn-ghost btn-sm" data-goto-registrar="${e.id}">Registrar</button>
        ${opts.editable ? `<button class="btn btn-danger btn-sm" data-del-evento="${e.id}">Eliminar</button>` : ''}
      </div>
    </div>
  </div>`;
}

function eventosHTML(){
  const lista = [...eventos].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  return `
  <div class="panel">
    <h2>Nuevo evento</h2>
    <div class="row">
      <div><label>Tipo de evento</label>
        <select id="evTipo">${TIPOS.map(t=>`<option value="${t.id}">${t.label}</option>`).join('')}</select>
      </div>
      <div><label>Sede</label>
        <select id="evSede">${sedes.map(s=>`<option value="${s}">${s}</option>`).join('')}</select>
      </div>
    </div>
    <div class="row">
      <div><label>Fecha</label><input type="date" id="evFecha" value="${hoy()}"></div>
      <div><label>Precio normal (S/)</label><input type="number" id="evPrecio" min="0" step="0.5" value="5"></div>
    </div>
    <div class="chk"><input type="checkbox" id="evTienePreventa"><label for="evTienePreventa">Este evento tiene precio de preventa</label></div>
    <div id="evPreventaBox" style="display:none;">
      <div class="row">
        <div><label>Precio preventa (S/)</label><input type="number" id="evPrecioPreventa" min="0" step="0.5" value="30"></div>
        <div><label>Válido hasta</label><input type="date" id="evFechaLimite"></div>
      </div>
    </div>
    <button class="btn btn-primary btn-block" id="btnCrearEvento">Crear evento</button>
  </div>

  <div class="panel">
    <h2>Eventos creados <span>${lista.length}</span></h2>
    ${lista.length ? lista.map(e=>ticketCard(e,{editable:true})).join('') : `<div class="empty">Aún no has creado ningún evento.</div>`}
  </div>`;
}

function registrarHTML(){
  const ordenados = [...eventos].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if(!registrarEventoId && ordenados.length) registrarEventoId = ordenados[0].id;
  const ev = eventos.find(e=>e.id===registrarEventoId);

  let formHTML = `<div class="empty">Crea un evento primero en la pestaña <b>Eventos</b>.</div>`;
  let listaHTML = '';

  if(ev){
    const sociosSede = socios.filter(s=>s.sede===ev.sede);
    const asis = asistencias.filter(a=>a.eventoId===ev.id);
    const totalPersonas = asis.reduce((s,a)=>s+a.entradas+a.gratis,0);
    const totalGratis = asis.reduce((s,a)=>s+a.gratis,0);
    const totalMonto = asis.reduce((s,a)=>s+a.monto,0);

    formHTML = `
    <div class="row">
      <div><label>Tipo de participante</label>
        <select id="rgTipoPart"><option value="socio">Socio (Sistema 180)</option><option value="invitado">Invitado desconocido</option></select>
      </div>
      <div id="rgSocioBox"><label>Socio</label>
        <select id="rgSocio">${sociosSede.length ? sociosSede.map(s=>`<option value="${s.id}">${s.nombre}</option>`).join('') : `<option value="">— sin socios en ${ev.sede} —</option>`}</select>
      </div>
      <div id="rgInvitadoBox" style="display:none;"><label>Nombre del invitado</label><input id="rgInvNombre" placeholder="Nombre completo"></div>
    </div>
    <div class="row">
      <div><label>Entradas pagadas</label><input type="number" id="rgEntradas" min="1" value="1"></div>
      ${ev.tienePreventa ? `<div><label>Tipo de compra</label><select id="rgTipoCompra"><option value="preventa">Preventa (${fmtSoles(ev.precioPreventa)})</option><option value="normal">Normal (${fmtSoles(ev.precioNormal)})</option></select></div>` : ''}
    </div>
    <div class="preview" id="rgPreview"></div>
    <button class="btn btn-primary btn-block" id="btnAgregarAsistencia">Registrar asistencia</button>
    `;

    listaHTML = `
    <table>
      <thead><tr><th>Participante</th><th>Pagadas</th><th>Gratis</th><th>Total llevadas</th><th>Monto</th><th>Registró</th><th></th></tr></thead>
      <tbody>
        ${asis.length ? asis.map(a=>`
          <tr>
            <td>${a.nombre} ${a.esSocio ? '' : '<span class="badge badge-sede">Invitado</span>'}</td>
            <td>${a.entradas}</td>
            <td>${a.gratis ? `<span class="badge badge-gratis">${a.gratis} gratis</span>` : '—'}</td>
            <td>${a.entradas + a.gratis}</td>
            <td class="mono">${fmtSoles(a.monto)}</td>
            <td style="color:var(--muted);font-size:12px;">${a.registradoPor}</td>
            <td><button class="btn btn-danger btn-sm" data-del-asistencia="${a.id}">✕</button></td>
          </tr>`).join('') : `<tr><td colspan="7" class="empty">Aún no hay asistentes registrados en este evento</td></tr>`}
      </tbody>
      ${asis.length ? `<tfoot><tr><td>Total</td><td>${totalPersonas}</td><td>${totalGratis}</td><td>${totalPersonas+totalGratis}</td><td class="mono">${fmtSoles(totalMonto)}</td><td></td><td></td></tr></tfoot>` : ''}
    </table>`;
  }

  return `
  <div class="panel">
    <h2>Evento activo</h2>
    <select id="rgEventoSelect">${ordenados.map(e=>`<option value="${e.id}" ${e.id===registrarEventoId?'selected':''}>${tipoLabel(e.tipo)} · ${e.sede} · ${fmtFecha(e.fecha)}</option>`).join('')}</select>
    ${ev ? `<div style="margin-top:14px;">${ticketCard(ev)}</div>` : ''}
  </div>
  <div class="panel">
    <h2>Registrar asistente</h2>
    ${formHTML}
  </div>
  ${ev ? `<div class="panel"><h2>Asistentes del evento</h2>${listaHTML}</div>` : ''}
  `;
}

function sociosHTML(){
  const filtrados = socios.filter(s=>s.nombre.toLowerCase().includes(socioSearch.toLowerCase()));
  return `
  <div class="panel">
    <h2>Nuevo socio</h2>
    <div class="row">
      <div><label>Nombre completo</label><input id="scNombre" placeholder="Nombre del socio"></div>
      <div><label>Sede / Escuela</label><select id="scSede">${sedes.map(s=>`<option value="${s}">${s}</option>`).join('')}</select></div>
    </div>
    <button class="btn btn-primary btn-block" id="btnAgregarSocio">Agregar socio</button>
  </div>
  <div class="panel">
    <h2>Catálogo de socios <span>${socios.length}</span></h2>
    <input class="search" id="scBuscar" placeholder="Buscar socio…" value="${socioSearch}">
    <table>
      <thead><tr><th>Nombre</th><th>Sede</th><th></th></tr></thead>
      <tbody>
        ${filtrados.length ? filtrados.map(s=>`
          <tr><td>${s.nombre}</td><td><span class="badge badge-sede">${s.sede}</span></td>
          <td><button class="btn btn-danger btn-sm" data-del-socio="${s.id}">✕</button></td></tr>
        `).join('') : `<tr><td colspan="3" class="empty">Sin resultados</td></tr>`}
      </tbody>
    </table>
  </div>`;
}

function reportesHTML(){
  let filas = [];
  if(reporteAgrupa==='sede'){
    const map = {};
    asistencias.forEach(a=>{ map[a.sede]=map[a.sede]||{personas:0,gratis:0,monto:0}; map[a.sede].personas+=a.entradas+a.gratis; map[a.sede].gratis+=a.gratis; map[a.sede].monto+=a.monto; });
    filas = Object.entries(map).map(([k,v])=>({k,...v}));
  } else if(reporteAgrupa==='evento'){
    const map = {};
    asistencias.forEach(a=>{
      const ev = eventos.find(e=>e.id===a.eventoId);
      const key = ev ? `${tipoLabel(ev.tipo)} · ${ev.sede} · ${fmtFecha(ev.fecha)}` : 'Evento eliminado';
      map[key]=map[key]||{personas:0,gratis:0,monto:0}; map[key].personas+=a.entradas+a.gratis; map[key].gratis+=a.gratis; map[key].monto+=a.monto;
    });
    filas = Object.entries(map).map(([k,v])=>({k,...v}));
  } else {
    const map = {};
    asistencias.forEach(a=>{ map[a.nombre]=map[a.nombre]||{personas:0,gratis:0,monto:0}; map[a.nombre].personas+=a.entradas+a.gratis; map[a.nombre].gratis+=a.gratis; map[a.nombre].monto+=a.monto; });
    filas = Object.entries(map).map(([k,v])=>({k,...v})).sort((a,b)=>b.personas-a.personas);
  }

  return `
  <div class="panel">
    <h2>Reportes</h2>
    <label>Agrupar por</label>
    <select id="repAgrupa">
      <option value="sede" ${reporteAgrupa==='sede'?'selected':''}>Sede</option>
      <option value="evento" ${reporteAgrupa==='evento'?'selected':''}>Evento</option>
      <option value="socio" ${reporteAgrupa==='socio'?'selected':''}>Socio / Invitado</option>
    </select>
    <table style="margin-top:16px;">
      <thead><tr><th>${reporteAgrupa==='sede'?'Sede':reporteAgrupa==='evento'?'Evento':'Nombre'}</th><th>Asistentes</th><th>Gratis</th><th>Recaudado</th></tr></thead>
      <tbody>${filas.length ? filas.map(f=>`<tr><td>${f.k}</td><td>${f.personas}</td><td>${f.gratis}</td><td class="mono">${fmtSoles(f.monto)}</td></tr>`).join('') : `<tr><td colspan="4" class="empty">Sin datos aún</td></tr>`}</tbody>
    </table>
    <button class="btn btn-ghost btn-block" id="btnExportar">Exportar todo a CSV (Excel)</button>
  </div>`;
}

// ---------- BINDINGS ----------
function bindProfileModal(){
  document.getElementById('pfGuardar').onclick = async () => {
    const nombre = document.getElementById('pfNombre').value.trim();
    const sede = document.getElementById('pfSede').value;
    if(!nombre){ alert('Escribe tu nombre'); return; }
    perfil = {nombre, sede};
    await storageSet('perfil', perfil, false);
    render();
  };
}

function bindGlobal(){
  document.querySelectorAll('nav button').forEach(b=>{
    b.onclick = () => { tab = b.dataset.tab; render(); };
  });
  const btnPerfil = document.getElementById('btnPerfil');
  if(btnPerfil) btnPerfil.onclick = async () => {
    const nuevoNombre = prompt('Tu nombre', perfil.nombre);
    if(nuevoNombre===null) return;
    const nuevaSede = prompt('Tu sede (' + sedes.join(', ') + ')', perfil.sede) || perfil.sede;
    perfil = {nombre:nuevoNombre.trim()||perfil.nombre, sede: sedes.includes(nuevaSede)?nuevaSede:perfil.sede};
    await storageSet('perfil', perfil, false);
    render();
  };

  document.querySelectorAll('[data-goto-registrar]').forEach(b=>{
    b.onclick = () => { registrarEventoId = b.dataset.gotoRegistrar; tab='registrar'; render(); };
  });

  if(tab==='eventos') bindEventos();
  if(tab==='registrar') bindRegistrar();
  if(tab==='socios') bindSocios();
  if(tab==='reportes') bindReportes();
}

function bindEventos(){
  const chk = document.getElementById('evTienePreventa');
  const box = document.getElementById('evPreventaBox');
  chk.onchange = () => box.style.display = chk.checked ? 'block' : 'none';

  document.getElementById('btnCrearEvento').onclick = async () => {
    const tipo = document.getElementById('evTipo').value;
    const sede = document.getElementById('evSede').value;
    const fecha = document.getElementById('evFecha').value;
    const precioNormal = parseFloat(document.getElementById('evPrecio').value)||0;
    const tienePreventa = chk.checked;
    const precioPreventa = tienePreventa ? (parseFloat(document.getElementById('evPrecioPreventa').value)||0) : null;
    const fechaLimitePreventa = tienePreventa ? document.getElementById('evFechaLimite').value : null;
    if(!fecha){ alert('Selecciona una fecha'); return; }
    eventos.push({id:uid(), tipo, sede, fecha, precioNormal, tienePreventa, precioPreventa, fechaLimitePreventa});
    await storageSet('eventos', eventos, true);
    render();
  };

  document.querySelectorAll('[data-del-evento]').forEach(b=>{
    b.onclick = async () => {
      if(!confirm('¿Eliminar este evento? También se perderán sus asistencias registradas.')) return;
      const id = b.dataset.delEvento;
      eventos = eventos.filter(e=>e.id!==id);
      asistencias = asistencias.filter(a=>a.eventoId!==id);
      await Promise.all([storageSet('eventos', eventos, true), storageSet('asistencias', asistencias, true)]);
      render();
    };
  });
}

function bindRegistrar(){
  const evSelect = document.getElementById('rgEventoSelect');
  if(evSelect) evSelect.onchange = () => { registrarEventoId = evSelect.value; render(); };

  const tipoPart = document.getElementById('rgTipoPart');
  const socioBox = document.getElementById('rgSocioBox');
  const invBox = document.getElementById('rgInvitadoBox');
  if(tipoPart){
    tipoPart.onchange = () => {
      const esSocio = tipoPart.value==='socio';
      socioBox.style.display = esSocio ? 'block' : 'none';
      invBox.style.display = esSocio ? 'none' : 'block';
      updatePreview();
    };
  }
  const entradasInput = document.getElementById('rgEntradas');
  const tipoCompra = document.getElementById('rgTipoCompra');
  if(entradasInput) entradasInput.oninput = updatePreview;
  if(tipoCompra) tipoCompra.onchange = updatePreview;
  updatePreview();

  function updatePreview(){
    const ev = eventos.find(e=>e.id===registrarEventoId);
    if(!ev) return;
    const pagadas = Math.max(1, parseInt(document.getElementById('rgEntradas').value)||1);
    const tc = document.getElementById('rgTipoCompra') ? document.getElementById('rgTipoCompra').value : 'normal';
    const precio = precioAplicable(ev, tc);
    const {gratis, total, monto} = calcTicket(pagadas, precio);
    const prev = document.getElementById('rgPreview');
    if(prev) prev.innerHTML = `${pagadas} entrada(s) pagada(s) a ${fmtSoles(precio)} c/u → le corresponden <b>${gratis} gratis</b> → total llevadas: <b>${total}</b> · a cobrar: <b>${fmtSoles(monto)}</b>`;
  }

  const btn = document.getElementById('btnAgregarAsistencia');
  if(btn) btn.onclick = async () => {
    const ev = eventos.find(e=>e.id===registrarEventoId);
    if(!ev) return;
    const esSocio = document.getElementById('rgTipoPart').value==='socio';
    let nombre, socioId=null, sede=ev.sede;
    if(esSocio){
      const sel = document.getElementById('rgSocio');
      if(!sel.value){ alert('No hay socios registrados en esta sede. Agrégalo primero en la pestaña Socios.'); return; }
      const s = socios.find(x=>x.id===sel.value);
      nombre = s.nombre; socioId = s.id; sede = s.sede;
    } else {
      nombre = document.getElementById('rgInvNombre').value.trim();
      if(!nombre){ alert('Escribe el nombre del invitado'); return; }
    }
    const pagadas = Math.max(1, parseInt(document.getElementById('rgEntradas').value)||1);
    const tc = document.getElementById('rgTipoCompra') ? document.getElementById('rgTipoCompra').value : 'normal';
    const precio = precioAplicable(ev, tc);
    const {gratis, total, monto} = calcTicket(pagadas, precio);
    asistencias.push({id:uid(), eventoId:ev.id, esSocio, socioId, nombre, sede, entradas:pagadas, tipoCompra:tc, gratis, total, monto, registradoPor:perfil.nombre, ts:Date.now()});
    await storageSet('asistencias', asistencias, true);
    render();
  };

  document.querySelectorAll('[data-del-asistencia]').forEach(b=>{
    b.onclick = async () => {
      asistencias = asistencias.filter(a=>a.id!==b.dataset.delAsistencia);
      await storageSet('asistencias', asistencias, true);
      render();
    };
  });
}

function bindSocios(){
  document.getElementById('btnAgregarSocio').onclick = async () => {
    const nombre = document.getElementById('scNombre').value.trim();
    const sede = document.getElementById('scSede').value;
    if(!nombre){ alert('Escribe el nombre del socio'); return; }
    socios.push({id:uid(), nombre, sede});
    await storageSet('socios', socios, true);
    render();
  };
  document.getElementById('scBuscar').oninput = (e) => { socioSearch = e.target.value; render(); };
  document.querySelectorAll('[data-del-socio]').forEach(b=>{
    b.onclick = async () => {
      socios = socios.filter(s=>s.id!==b.dataset.delSocio);
      await storageSet('socios', socios, true);
      render();
    };
  });
}

function bindReportes(){
  document.getElementById('repAgrupa').onchange = (e) => { reporteAgrupa = e.target.value; render(); };
  document.getElementById('btnExportar').onclick = () => {
    const header = ['Evento','Tipo','Sede evento','Fecha','Participante','Tipo participante','Sede participante','Pagadas','Gratis','Total llevadas','Tipo compra','Monto (S/)','Registrado por'];
    const rows = asistencias.map(a=>{
      const ev = eventos.find(e=>e.id===a.eventoId) || {};
      return [tipoLabel(ev.tipo)||'', ev.tipo||'', ev.sede||'', ev.fecha||'', a.nombre, a.esSocio?'Socio':'Invitado', a.sede, a.entradas, a.gratis, a.entradas+a.gratis, a.tipoCompra, a.monto.toFixed(2), a.registradoPor];
    });
    const csv = [header, ...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\\n');
    const blob = new Blob(['\\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'control_eventos_180_' + hoy() + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
}

loadAll();
